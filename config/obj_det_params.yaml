object_detection_node:
  ros__parameters:


    # ----- Hardware Decoder Configuration -----
    hardware_decoder: "cuda"      # "auto", "vic", or "cuda" 
                                  #   — "vic"  : upstream feeds a raw YUV/NV12 NvBufSurface (ArgusCamera direct path)
                                  #   — "cuda" : upstream feeds a float32 NCHW tensor (DnnImageEncoder path — use this)
                                  #   — "auto" : same as "vic" (assumes NvBufSurface input)

    # ----- Object Detection Engine Configuration -----
    engine:
      model_path: "/home/orin/ros2_ws/src/ros2_px4_object_follower/isaac_ros_object_detection/engines/yolo26n_fp16.plan"
      class_names_path: "/home/orin/ros2_ws/src/ros2_px4_object_follower/isaac_ros_object_detection/config/coco.names"
      quantization: "fp16"  # "fp16" or "int8" (must match how the engine was built)
      input_width: 640
      input_height: 640
      num_classes: 80
      input_tensor_name: "input_tensor"
      trt_input_binding_name: "images"
      output_tensor_name: "output0"

    # ----- Post-processing Filters -----
    filters:
      confidence_threshold: 0.20
      nms_threshold: 0.45
      classes: [-1]  # Only keep detections of given classes — set to [-1] to keep all classes


    # ----- ROS Topics -----
    topics:
      enc_tensor_sub: # subscribe to NitrosTensorListView — ManagedNitrosSubscriber appends /nitros internally
        topic_name: "/dnn_enc/encoded_tensor"
        qos:
          reliability: "best_effort"   # NITROS zero-copy works well with best_effort
          durability: "volatile"       # volatile | transient_local
          depth: 10
      detection_pub:  # Publish detections as vision_msgs/Detection2DArray
        topic_name: "/object_detection/detections"
        qos:
          reliability: "best_effort"
          durability: "volatile"
          depth: 10
  

    
